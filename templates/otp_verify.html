<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
    {% with messages = get_flashed_messages() %}
  {% if messages %}
    <div style="background:#222; color:#0f0; padding:10px; margin-bottom:15px; border-radius:5px;">
      {% for message in messages %}
        <p>{{ message }}</p>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<div class="auth-container">
    <div class="auth-card">
        <h2>Verify OTP</h2>
        <p class="subtitle">Enter the code sent to your email</p>

        <form method="POST" action="/verify_otp">
            <input type="text" name="otp" placeholder="Enter OTP" maxlength="6" required>

            <button type="submit">Verify</button>
        </form>
        <div style="
    background: #1e1e1e;
    color: #00ffcc;
    padding: 12px;
    border-radius: 8px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 15px;
">
    {{ message }}
</div>
    </div>
</div>

</body>
</html>
